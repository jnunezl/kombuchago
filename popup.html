<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Kombucha Go</title>
  <style>
    :root {
      --bg:         #1a1d23;
      --surface:    #22262e;
      --border:     #2e3340;
      --accent:     #2ed573;
      --accent-dim: #1a7a45;
      --danger:     #ff4757;
      --text:       #e8eaf0;
      --muted:      #8a90a0;
      --radius:     10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 15px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo { font-size: 20px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p  { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .status-card {
      margin: 12px 12px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px;
    }
    .state-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 11px;
    }
    .state-left { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background .3s;
    }
    .dot.on { background: var(--accent); }
    .state-name { font-weight: 700; }
    .state-sub  { font-size: 11px; color: var(--muted); }

    .timers { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .tbox {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px; text-align: center;
    }
    .tval     { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; }
    .tval.off { color: var(--muted); }
    .tlbl     { font-size: 10px; color: var(--muted); margin-top: 3px; }

    .wl-badge {
      margin: 8px 12px 0; padding: 8px 11px; border-radius: 7px;
      font-size: 11px; line-height: 1.4;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    }
    .wl-badge.on { background: #0d1f14; border-color: var(--accent-dim); color: #6be89a; }

    .btn-main {
      margin: 10px 12px 0; width: calc(100% - 24px);
      padding: 10px; border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s;
    }
    .btn-main.start { background: var(--accent); color: #0a1a0d; }
    .btn-main.start:hover { background: #40ff80; }
    .btn-main.stop  { background: var(--danger); color: #fff; }
    .btn-main.stop:hover  { background: #ff6b78; }

    .sep {
      padding: 12px 12px 5px;
      font-size: 10px; font-weight: 700; letter-spacing: .9px;
      text-transform: uppercase; color: var(--muted);
    }
    .fields { margin: 0 12px; display: flex; flex-direction: column; gap: 7px; }
    .field {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 11px;
    }
    .flabel { font-size: 10px; color: var(--muted); margin-bottom: 7px; }

    /* Selector de icono */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }
    .icon-opt {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; cursor: pointer; transition: all .15s;
      padding: 5px 2px;
    }
    .icon-opt:hover { border-color: var(--accent); }
    .icon-opt.on {
      background: var(--accent-dim); border-color: var(--accent);
    }
    .icon-opt svg { display: block; }
    .icon-opt span {
      font-size: 9px; color: var(--muted); text-align: center; line-height: 1;
    }
    .icon-opt.on span { color: var(--accent); }

    .footer {
      margin: 10px 12px 12px;
      font-size: 10px; color: var(--muted); text-align: center; line-height: 1.5;
    }
    .version-badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
      margin-left: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🫧</div>
    <div>
      <h1>Kombucha Go <span class="version-badge">v1.0</span></h1>
      <p>Sin procesos externos · Firefox &amp; Chrome</p>
    </div>
  </div>

  <div class="status-card">
    <div class="state-row">
      <div class="state-left">
        <div class="dot" id="dot"></div>
        <span class="state-name" id="stateName">Inactivo</span>
      </div>
      <span class="state-sub" id="stateSub">—</span>
    </div>
    <div class="timers">
      <div class="tbox">
        <div class="tval off" id="tRemain">--:--</div>
        <div class="tlbl">Tiempo restante</div>
      </div>
      <div class="tbox">
        <div class="tval off" id="tEnd">--:--</div>
        <div class="tlbl">Finaliza a las</div>
      </div>
    </div>
  </div>

  <div class="wl-badge" id="wlBadge">🔒 Suspensión del sistema habilitada</div>

  <button class="btn-main start" id="btnMain">▶ Iniciar</button>

  <div class="sep">⚙ Configuración</div>
  <div class="fields">

    <div class="field">
      <div class="flabel" style="display:flex; justify-content:space-between; align-items:center;">
        <span>⏱ Duración total</span>
        <span id="durLabel" style="color:var(--accent); font-weight:700; font-size:12px;">30 min</span>
      </div>
      <input type="range" id="durSlider" min="0" max="100" value="30"
        style="width:100%; margin-top:6px; accent-color:#2ed573; cursor:pointer;" />
      <div style="display:flex; justify-content:space-between; margin-top:3px; font-size:9px; color:var(--muted);">
        <span>1 min</span><span>∞</span>
      </div>
    </div>

    <div class="field">
      <div class="flabel">🖼 Icono en la ventana activa</div>
      <div class="icon-grid" id="iconGrid"></div>
    </div>

  </div>

  <div class="footer">
    El icono se muestra en la ventana auxiliar mientras está activo.
  </div>

  <script src="compat.js"></script>
  <script src="icons_def.js"></script>
  <script src="popup.js"></script>
</body>
</html>
